name: ci

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Validate line endings
        shell: pwsh
        run: .\scripts\verify-line-endings.ps1

      - name: Validate central package management
        shell: pwsh
        run: .\scripts\verify-central-package-versions.ps1

      - name: Restore
        run: dotnet restore Atlas.sln

      - name: Build
        run: dotnet build Atlas.sln --no-restore --configuration Release

      - name: Test core
        run: dotnet test tests/Atlas.Core.Tests/Atlas.Core.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=Atlas.Core.Tests.trx" --collect "XPlat Code Coverage" --results-directory TestResults/Atlas.Core.Tests

      - name: Test analyzers
        run: dotnet test tests/Atlas.Analyzers.Tests/Atlas.Analyzers.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=Atlas.Analyzers.Tests.trx" --collect "XPlat Code Coverage" --results-directory TestResults/Atlas.Analyzers.Tests

      - name: Test data
        run: dotnet test tests/Atlas.Data.Tests/Atlas.Data.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=Atlas.Data.Tests.trx" --collect "XPlat Code Coverage" --results-directory TestResults/Atlas.Data.Tests

      - name: Test services
        run: dotnet test tests/Atlas.Services.Tests/Atlas.Services.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=Atlas.Services.Tests.trx" --collect "XPlat Code Coverage" --results-directory TestResults/Atlas.Services.Tests

      - name: Verify module template
        shell: pwsh
        run: .\scripts\verify-atlas-module-template.ps1

      - name: Test integration
        if: ${{ vars.RUN_INTEGRATION_TESTS == 'true' }}
        run: dotnet test tests/Atlas.Integration.Tests/Atlas.Integration.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=Atlas.Integration.Tests.trx" --collect "XPlat Code Coverage" --results-directory TestResults/Atlas.Integration.Tests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**
          if-no-files-found: ignore
